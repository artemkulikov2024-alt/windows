name: Windows-Start
on: workflow_dispatch
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Launching Windows
        run: |
          # 1. Запуск системы Windows в фоновом режиме
          docker run -d -p 8006:8006 --device=/dev/kvm --cap-add NET_ADMIN -e VERSION="tiny11" dockurr/windows
          
          # 2. Установка программы Ngrok для создания ссылки
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok
          
          # 3. Твой личный ключ доступа (токен)
          ngrok config add-authtoken 3AeeqIOXuqDrmWOF16XEWjNTkt1_6KW57XsWXucF9ExRkLPsJ
          
          # 4. Создание ссылки на экран
          echo "--- ССЫЛКА ПОЯВИТСЯ НИЖЕ ЧЕРЕЗ ПАРУ МИНУТ ---"
          ngrok http 8006 --log=stdout
